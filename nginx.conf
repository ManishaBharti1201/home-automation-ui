server {
  listen 80;
  server_name localhost;

  # MUST include this for the browser to recognize the video format
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Performance & Streaming Optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Media specific handling
  location /weather/ {
    root /usr/share/nginx/html;

    # Explicitly define types to ensure video/mp4 is sent correctly
    types {
      video/mp4 mp4;
      image/gif gif;
      image/png png;
    }

    # Performance & Caching
    add_header Cache-Control "public, max-age=31536000";

    # Ensure the browser knows it can request partial chunks (Byte-Range)
    add_header Accept-Ranges bytes always;
  }
}