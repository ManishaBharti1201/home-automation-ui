server {
  listen 80;
  server_name localhost;

  # MUST include this for the browser to recognize the video format
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Performance & Streaming Optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;

    # FIX: Force iOS/Apple devices to check for new React bundle files every time
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    expires off;
  }

  # Media specific handling
  location /weather/ {
    root /usr/share/nginx/html;

    # Disable sendfile for media to avoid Docker/VM filesystem sync issues
    sendfile off;
    tcp_nopush off;

    # Explicitly define types to ensure video/mp4 is sent correctly
    types {
      video/mp4 mp4;
      image/gif gif;
      image/png png;
    }

    # FIX: Required for Apple/Safari video streaming (Range requests)
    add_header Accept-Ranges bytes;

    # Performance & Caching for media assets
    add_header Cache-Control "public, max-age=31536000";
  }
}
